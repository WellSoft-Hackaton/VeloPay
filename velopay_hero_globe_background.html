<style>
*{margin:0;padding:0;box-sizing:border-box}
#hero-bg{width:100%;height:520px;background:#040d04;position:relative;overflow:hidden;border-radius:12px}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
</style>
<div id="hero-bg"><canvas id="c"></canvas></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.offsetWidth;
const H = canvas.offsetHeight;
canvas.width = W * devicePixelRatio;
canvas.height = H * devicePixelRatio;
ctx.scale(devicePixelRatio, devicePixelRatio);

const GREEN = '#13B601';
const cx = W * 0.68, cy = H * 0.48, R = Math.min(W, H) * 0.35;

let t = 0;

// Globe nodes - positioned to represent Africa/Middle East region heavily
const nodes = [
  // Middle East & Gulf
  {lat:25,lon:45,r:3.5,bright:1},{lat:24,lon:54,r:2.5,bright:0.9},{lat:29,lon:34,r:2,bright:0.7},
  {lat:33,lon:44,r:3,bright:0.95},{lat:31,lon:36,r:2,bright:0.75},{lat:15,lon:39,r:1.5,bright:0.6},
  // Africa
  {lat:6,lon:20,r:2,bright:0.7},{lat:-26,lon:28,r:3,bright:0.85},{lat:9,lon:7,r:2,bright:0.65},
  {lat:30,lon:31,r:3.5,bright:1},{lat:-4,lon:15,r:1.5,bright:0.55},{lat:14,lon:13,r:1.5,bright:0.5},
  // Europe/South Asia (faint)
  {lat:48,lon:15,r:1.5,bright:0.4},{lat:51,lon:0,r:1.5,bright:0.4},{lat:19,lon:73,r:2,bright:0.6},
  {lat:28,lon:77,r:2.5,bright:0.7},{lat:41,lon:29,r:2,bright:0.65},
  // SE Asia / Far East
  {lat:1,lon:104,r:1.5,bright:0.35},{lat:35,lon:139,r:1.5,bright:0.3},
];

// Connections (pairs of node indices)
const conns = [
  [0,1],[0,3],[1,3],[3,4],[0,9],[9,4],[3,13],
  [2,9],[5,8],[8,6],[6,11],[11,10],[7,10],
  [0,16],[3,14],[14,15],[9,12],[12,13],
  [1,6],[0,8],[3,5]
];

// Background particles
const particles = Array.from({length:60},()=>({
  x:Math.random()*W, y:Math.random()*H,
  vx:(Math.random()-0.5)*0.15, vy:(Math.random()-0.5)*0.15,
  r:Math.random()*1.2+0.3, a:Math.random()*0.3+0.05
}));

// Convert lat/lon to 3D then 2D projected on globe
function project(lat,lon,tilt=0){
  const phi = (90-lat)*Math.PI/180;
  const theta = (lon+180)*Math.PI/180 + tilt;
  const x3 = Math.sin(phi)*Math.cos(theta);
  const y3 = Math.cos(phi);
  const z3 = Math.sin(phi)*Math.sin(theta);
  // Simple orthographic with slight tilt
  const px = cx + R*(x3*0.9 - y3*0.1);
  const py = cy + R*(-y3*0.85 + x3*0.05);
  return {x:px, y:py, z:z3, visible: z3 > -0.15};
}

function hexAlpha(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawGlobe(tilt){
  // Globe base - deep dark sphere
  const grad = ctx.createRadialGradient(cx-R*0.25,cy-R*0.2,R*0.05,cx,cy,R);
  grad.addColorStop(0,'rgba(8,32,8,0.55)');
  grad.addColorStop(0.5,'rgba(4,16,4,0.35)');
  grad.addColorStop(1,'rgba(0,6,0,0.15)');
  ctx.beginPath();
  ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.fillStyle=grad;
  ctx.fill();

  // Globe ring edge glow
  const edgeGrad = ctx.createRadialGradient(cx,cy,R*0.88,cx,cy,R);
  edgeGrad.addColorStop(0,'transparent');
  edgeGrad.addColorStop(0.7,hexAlpha(GREEN,0.03));
  edgeGrad.addColorStop(1,hexAlpha(GREEN,0.12));
  ctx.beginPath();
  ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.fillStyle=edgeGrad;
  ctx.fill();

  // Latitude lines (subtle)
  for(let lat=-60;lat<=60;lat+=30){
    const pts=[];
    for(let lon=-180;lon<=180;lon+=5){
      const p=project(lat,lon,tilt);
      if(p.visible) pts.push(p);
    }
    if(pts.length<2) continue;
    ctx.beginPath();
    pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.strokeStyle=hexAlpha(GREEN,0.06);
    ctx.lineWidth=0.5;
    ctx.stroke();
  }

  // Longitude lines (subtle)
  for(let lon=-180;lon<=180;lon+=30){
    const pts=[];
    for(let lat=-80;lat<=80;lat+=5){
      const p=project(lat,lon,tilt);
      if(p.visible) pts.push(p);
    }
    if(pts.length<2) continue;
    ctx.beginPath();
    pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.strokeStyle=hexAlpha(GREEN,0.04);
    ctx.lineWidth=0.5;
    ctx.stroke();
  }
}

function drawConnections(tilt,pulse){
  conns.forEach(([a,b],ci)=>{
    const pa=project(nodes[a].lat,nodes[a].lon,tilt);
    const pb=project(nodes[b].lat,nodes[b].lon,tilt);
    if(!pa.visible||!pb.visible) return;

    // Curved connection
    const mx=(pa.x+pb.x)/2, my=(pa.y+pb.y)/2;
    const dx=pb.x-pa.x, dy=pb.y-pa.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const curveAmt=dist*0.18;
    // Curve outward from globe center
    const midToCx=mx-cx, midToCy=my-cy;
    const midDist=Math.sqrt(midToCx*midToCx+midToCy*midToCy)||1;
    const cpx=mx+(midToCx/midDist)*curveAmt;
    const cpy=my+(midToCy/midDist)*curveAmt;

    const alpha = 0.12 + 0.06*(nodes[a].bright+nodes[b].bright)/2;
    ctx.beginPath();
    ctx.moveTo(pa.x,pa.y);
    ctx.quadraticCurveTo(cpx,cpy,pb.x,pb.y);
    ctx.strokeStyle=hexAlpha(GREEN,alpha);
    ctx.lineWidth=0.6;
    ctx.stroke();

    // Pulse particle along the connection
    const phase=(pulse+ci*0.13)%1;
    const bx=((1-phase)*(1-phase)*pa.x+2*(1-phase)*phase*cpx+phase*phase*pb.x);
    const by=((1-phase)*(1-phase)*pa.y+2*(1-phase)*phase*cpy+phase*phase*pb.y);
    const pAlpha=Math.sin(phase*Math.PI)*0.85;
    ctx.beginPath();
    ctx.arc(bx,by,1.8,0,Math.PI*2);
    ctx.fillStyle=hexAlpha('#7fff7f',pAlpha);
    ctx.fill();
  });
}

function drawNodes(tilt){
  nodes.forEach((nd,i)=>{
    const p=project(nd.lat,nd.lon,tilt);
    if(!p.visible) return;
    const pulse=Math.sin(t*1.8+i*0.8)*0.3+0.7;
    const base=nd.r;
    const r=base*(0.9+pulse*0.15);

    // Outer glow
    const ggrad=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*4);
    ggrad.addColorStop(0,hexAlpha(GREEN,0.35*nd.bright*pulse));
    ggrad.addColorStop(1,'transparent');
    ctx.beginPath();
    ctx.arc(p.x,p.y,r*4,0,Math.PI*2);
    ctx.fillStyle=ggrad;
    ctx.fill();

    // Core dot
    ctx.beginPath();
    ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=hexAlpha('#b0ffb0',0.75*nd.bright);
    ctx.fill();

    // Center bright
    ctx.beginPath();
    ctx.arc(p.x,p.y,r*0.45,0,Math.PI*2);
    ctx.fillStyle=hexAlpha('#ffffff',0.7*nd.bright);
    ctx.fill();
  });
}

function drawParticles(){
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=hexAlpha(GREEN,p.a*0.5);
    ctx.fill();
  });
}

function drawAmbientLight(){
  // Left side - dark
  const leftGrad=ctx.createRadialGradient(W*0.15,H*0.5,0,W*0.15,H*0.5,W*0.4);
  leftGrad.addColorStop(0,'rgba(0,0,0,0)');
  leftGrad.addColorStop(1,'rgba(0,0,0,0.3)');
  ctx.fillStyle=leftGrad;
  ctx.fillRect(0,0,W,H);

  // Globe ambient green glow
  const globeGlow=ctx.createRadialGradient(cx,cy,R*0.3,cx,cy,R*1.4);
  globeGlow.addColorStop(0,'transparent');
  globeGlow.addColorStop(0.7,'transparent');
  globeGlow.addColorStop(1,hexAlpha(GREEN,0.06));
  ctx.beginPath();
  ctx.arc(cx,cy,R*1.4,0,Math.PI*2);
  ctx.fillStyle=globeGlow;
  ctx.fill();
}

function frame(){
  t+=0.012;
  const tilt = t * 0.08; // slow rotation
  const pulse = (t * 0.35) % 1;

  ctx.clearRect(0,0,W,H);

  // Deep background
  ctx.fillStyle='#040d04';
  ctx.fillRect(0,0,W,H);

  // Very faint top-right vignette green
  const vg=ctx.createRadialGradient(W,0,0,W,0,W*0.7);
  vg.addColorStop(0,hexAlpha(GREEN,0.04));
  vg.addColorStop(1,'transparent');
  ctx.fillStyle=vg;
  ctx.fillRect(0,0,W,H);

  drawParticles();
  drawAmbientLight();
  drawGlobe(tilt);
  drawConnections(tilt,pulse);
  drawNodes(tilt);

  requestAnimationFrame(frame);
}

frame();
</script>
